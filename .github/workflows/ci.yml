name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: detect stack
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.set.outputs.python }}
      node:   ${{ steps.set.outputs.node }}
      swift:  ${{ steps.set.outputs.swift }}
    steps:
      - uses: actions/checkout@v7
      - id: set
        run: |
          echo "python=$([ -f pyproject.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "node=$([ -f package.json ] && echo true || echo false)"     >> "$GITHUB_OUTPUT"
          echo "swift=$([ -f Package.swift ] && echo true || echo false)"   >> "$GITHUB_OUTPUT"

  commitlint:
    name: conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: git ls-files -z '*.sh' | xargs -0 shellcheck -S warning

  shell-tests:
    name: shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # zsh is required: the cc launcher is zsh, and its tests drive the real functions
      # rather than a reimplementation of them.
      - name: install zsh
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      # Deliberately NOT `make test` — that also fans out to pytest/npm/swift, which this job
      # does not own. Enumerate from the glob, and FAIL LOUD when it matches nothing: an empty
      # glob quietly passing is exactly how these suites went unrun. They existed for months;
      # the only runner was `make test`, which CI never invokes, and the `python` job that
      # would otherwise have reached them is gated on a pyproject.toml this repo has never
      # had. A test suite with no caller is decoration that reads like a safety net.
      - name: run tests/*.sh
        run: |
          set -euo pipefail
          shopt -s nullglob
          tests=(tests/*.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "no tests/*.sh found — the glob matched nothing, which is a wiring bug, not a pass"
            exit 1
          fi
          echo "running ${#tests[@]} suite(s)"
          for t in "${tests[@]}"; do
            echo "--- $t"
            bash "$t"
          done

  python:
    name: python lint + test
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with: { version: "latest" }
      # --all-extras: PEP 621 [project.optional-dependencies]
      # --all-groups: PEP 735 [dependency-groups]
      - run: uv sync --frozen --all-extras --all-groups
      # ruff via uvx — no need to add ruff to project deps.
      - name: ruff check
        run: uvx ruff@0.6.9 check .
      - name: ruff format check
        run: uvx ruff@0.6.9 format --check .
      - name: pytest
        if: hashFiles('tests/**') != ''
        run: uv run pytest -q

  node:
    name: node lint + test
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      # npm install (not ci) tolerates lockfile drift and missing lockfile.
      # Lock down to `npm ci` per-repo once the lockfile is reliably in sync.
      - run: npm install --no-audit --no-fund
      - name: lint
        run: npm run lint --if-present
      - name: test
        run: npm test --if-present

  swift:
    name: swift build + test
    needs: detect
    if: needs.detect.outputs.swift == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: swift build
        run: swift build
      - name: swift test
        if: hashFiles('Tests/**') != ''
        run: swift test

  ci:
    name: ci
    needs: [detect, commitlint, gitleaks, shellcheck, shell-tests, python, node, swift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: aggregate
        run: |
          if [ "${{ needs.detect.result }}" != "success" ]; then
            echo "Stack detection failed or was cancelled: ${{ needs.detect.result }}"
            exit 1
          fi
          # Fail if any required upstream job failed (skipped is OK for stack-conditional jobs).
          # `needs['shell-tests']` uses bracket syntax deliberately: a hyphenated job id in
          # property-dereference form is the kind of expression that, if it failed to resolve,
          # would render as an EMPTY string here — which this loop reads as "not a failure".
          # A gate whose own lookup can silently evaluate to nothing is a fake green.
          n=0
          for r in "${{ needs.commitlint.result }}" "${{ needs.gitleaks.result }}" \
                   "${{ needs.shellcheck.result }}" "${{ needs['shell-tests'].result }}" \
                   "${{ needs.python.result }}" "${{ needs.node.result }}" "${{ needs.swift.result }}"; do
            # An EMPTY result is not a pass. A job's result is always one of success /
            # failure / cancelled / skipped, so empty means the expression above did not
            # resolve — a typo'd or renamed job id. Failing closed here is what stops a
            # renamed job from silently dropping out of the gate while it still reads green.
            if [ -z "$r" ]; then
              echo "Upstream job result is EMPTY — a needs[...] lookup did not resolve (renamed/typo'd job id?)"
              exit 1
            fi
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Upstream job failed: $r"
              exit 1
            fi
            n=$((n + 1))
          done
          # Enumerate-and-count: the loop above is a literal list, so a job removed from the
          # list disappears from the gate silently. Assert the expected arity too.
          if [ "$n" -ne 7 ]; then
            echo "Expected 7 upstream results, saw $n — the gate's job list drifted"
            exit 1
          fi
          echo "All required checks passed ($n jobs)."
