# Starship prompt — Sterngold C64 palette (truecolor / 24-bit hex)
#
# Palette (these are starship's actual render colors, via 24-bit truecolor):
#   #7869C4  primary purple   — positive / good state
#   #afd7ff  light blue       — info / branches
#   #d787ff  emphasis purple  — opus / special
#   #D5DF7C  warning yellow   — warning
#   #9A9A9A  light gray       — default text
#   #9A6759  terra cotta      — critical
#
# Sibling `~/anders-dotfiles/claude/statusline.sh` uses the same color *names*
# but renders via ANSI 256-color escape sequences (38;5;111 etc.), which look
# slightly different from these hex values in practice. Two systems, same
# C64-inspired palette family, not pixel-identical.

add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

right_format = "$status"

[character]
success_symbol = "[★](#7869C4)"
error_symbol = "[★](#9A6759)"

[directory]
style = "bold #afd7ff"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "#9A6759"

[git_branch]
symbol = " "
style = "#d787ff"
format = "[$symbol$branch]($style) "

[git_status]
style = "#D5DF7C"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
# detect_* arrays narrowed from defaults — uv / pyproject workflow only.
symbol = " "
style = "#7869C4"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
python_binary = ["python3", "python3.12", "python"]
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol = " "
style = "#7869C4"
format = "[$symbol($version )]($style)"

[cmd_duration]
style = "#9A9A9A"
format = "[⏱ $duration]($style) "

[status]
disabled = false
style = "#9A6759"
symbol = "✘"
format = "[$symbol $status]($style)"

# All five modules hidden — no active workflows on this machine.
[aws]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = true
[docker_context]
disabled = true
[package]
disabled = true
